<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-start justify-center pt-16 px-4">

    <div class="bg-white shadow-md rounded-md p-6 w-full max-w-md">
        <h1 class="font-bold text-xl mb-5">Inventory System</h1>

        <div class="mb-3 flex items-center gap-3">
            <label class="w-20 text-sm font-medium text-gray-700">Item:</label>
            <input id="item-input" type="text" class="border border-gray-400 px-2 py-1 text-sm w-48 rounded" />
        </div>
        <div class="mb-3 flex items-center gap-3">
            <label class="w-20 text-sm font-medium text-gray-700">Quantity:</label>
            <input id="qty-input" type="number" class="border border-gray-400 px-2 py-1 text-sm w-48 rounded" min="0" />
        </div>

        <button onclick="addItem()"
            class="border border-gray-400 bg-gray-100 hover:bg-gray-200 text-sm px-4 py-1 rounded mb-5">
            Submit
        </button>

        <div class="flex items-center gap-2 mb-3">
            <label class="text-sm text-gray-700">View table (Check the box)</label>
            <input type="checkbox" id="toggle-table" onchange="toggleTable()" class="w-4 h-4 accent-blue-600" />
        </div>

        <!-- TABLE -->
        <div id="table-container" class="hidden">
            <table class="w-full border-collapse border border-gray-400 text-sm">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border border-gray-400 px-4 py-2 text-left">Item</th>
                        <th class="border border-gray-400 px-4 py-2 text-left">Quantity</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                </tbody>
            </table>
            <p class="text-xs text-gray-400 mt-2 italic">Double-click on quantity cell to edit.</p>
        </div>
    </div>

    <script>
        let inventory = [];

        function addItem() {
            const itemInput = document.getElementById('item-input');
            const qtyInput = document.getElementById('qty-input');

            const itemName = itemInput.value.trim();
            const quantity = parseInt(qtyInput.value);

            if (!itemName) {
                alert('Please enter an item name.');
                return;
            }
            if (isNaN(quantity) || quantity < 0) {
                alert('Please enter a valid quantity.');
                return;
            }

            // CHECK FOR DUPLICATE
            const existing = inventory.find(i => i.name.toLowerCase() === itemName.toLowerCase());
            if (existing) {
                alert('Item already exists. Double-click the quantity in the table to edit it.');
                return;
            }

            inventory.push({ name: itemName, quantity: quantity });
            renderTable();

            itemInput.value = '';
            qtyInput.value = '';
        }

        function renderTable() {
            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = '';

            inventory.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50';

                // ITEM CELL
                const nameCell = document.createElement('td');
                nameCell.textContent = item.name;
                nameCell.className = 'border border-gray-400 px-4 py-2';

                // QUANTITY CELL
                const qtyCell = document.createElement('td');
                qtyCell.textContent = item.quantity;
                qtyCell.className = 'border border-gray-400 px-4 py-2 cursor-pointer select-none';
                qtyCell.title = 'Double-click to edit';

                qtyCell.addEventListener('dblclick', function () {
                    startEditing(qtyCell, index);
                });

                row.appendChild(nameCell);
                row.appendChild(qtyCell);
                tbody.appendChild(row);
            });
        }

        function startEditing(cell, index) {
            if (cell.querySelector('input')) return;

            const currentVal = inventory[index].quantity;

            const input = document.createElement('input');
            input.type = 'number';
            input.value = currentVal;
            input.min = '0';
            input.className = 'border border-blue-400 px-1 py-0 text-sm w-20 rounded outline-none';

            cell.textContent = '';
            cell.appendChild(input);
            input.focus();
            input.select();

            function saveEdit() {
                const newQty = parseInt(input.value);
                if (!isNaN(newQty) && newQty >= 0) {
                    inventory[index].quantity = newQty;
                }
                renderTable();
            }

            input.addEventListener('blur', saveEdit);
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') saveEdit();
                if (e.key === 'Escape') renderTable();
            });
        }

        function toggleTable() {
            const checked = document.getElementById('toggle-table').checked;
            document.getElementById('table-container').classList.toggle('hidden', !checked);
        }
    </script>

</body>

</html>
